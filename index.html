// ── SHARED COMPONENTS ────────────────────────────────────────────────────────
function TopTabs({ active, onChange, tabs }) {
  return (
    <div style={{ display: "flex", borderBottom: `1px solid ${P.border}`, background: P.bg, position: "sticky", top: 0, zIndex: 10, overflowX: "auto" }}>
      {tabs.map(t => (
        <button
          key={t.id}
          onClick={() => onChange(t.id)}
          style={{
            flex: "none", padding: "12px 11px", fontSize: 12,
            fontWeight: active === t.id ? 700 : 500,
            color: active === t.id ? P.accent : P.textMid,
            background: "none", border: "none",
            borderBottom: active === t.id ? `2.5px solid ${P.accent}` : "2.5px solid transparent",
            cursor: "pointer", whiteSpace: "nowrap", fontFamily: "inherit",
          }}
        >
          {t.icon} {t.label}
        </button>
      ))}
    </div>
  );
}

function SubTabs({ active, onChange, tabs }) {
  return (
    <div style={{ display: "flex", gap: 6, padding: "8px 16px 10px", overflowX: "auto", background: P.bg }}>
      {tabs.map(t => (
        <button
          key={t.id}
          onClick={() => onChange(t.id)}
          style={{
            flex: "none", padding: "7px 14px", borderRadius: 20, fontSize: 12, fontWeight: 600,
            border: active === t.id ? `1.5px solid ${P.accent}` : `1px solid ${P.border}`,
            background: active === t.id ? P.accentLight : P.card,
            color: active === t.id ? P.accent : P.textMid,
            cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap",
          }}
        >
          {t.label}
        </button>
      ))}
    </div>
  );
}

function Card({ children, style, onClick }) {
  return (
    <div
      onClick={onClick}
      style={{
        background: P.card, borderRadius: 10, border: `1px solid ${P.border}`,
        padding: 16, marginBottom: 12,
        cursor: onClick ? "pointer" : "default", ...style,
      }}
    >
      {children}
    </div>
  );
}

// ── TAB: ITINERARY ───────────────────────────────────────────────────────────
function ItineraryTab({ groups, onEditOpen }) {
  const [expanded, setExpanded] = useState(null);

  return (
    <div style={{ padding: "16px 16px 100px", position: "relative" }}>
      <h2 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 22, color: P.text, margin: "0 0 4px" }}>Your Journey</h2>
      <p style={{ color: P.textLight, fontSize: 13, margin: "0 0 14px" }}>Apr 19 – May 21, 2026 · 33 days · 13 stops</p>

      <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginBottom: 18, padding: "8px 12px", background: P.card, borderRadius: 8, border: `1px solid ${P.border}` }}>
        {Object.entries(TYPE_CFG).map(([key, cfg]) => (
          <div key={key} style={{ display: "flex", alignItems: "center", gap: 5 }}>
            <div style={{ width: 9, height: 9, borderRadius: "50%", background: cfg.color }} />
            <span style={{ fontSize: 11, color: P.textMid, fontWeight: 500 }}>{cfg.label}</span>
          </div>
        ))}
      </div>

      {groups.map((stop, i) => {
        const cfg = TYPE_CFG[stop.type] || { color: P.textMid, bg: "#f5f3ef" };
        const open = expanded === i;
        const isLast = i === groups.length - 1;

        return (
          <div key={i} style={{ display: "flex", gap: 12 }}>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", width: 22, flexShrink: 0, paddingTop: 18 }}>
              <div style={{ width: 12, height: 12, borderRadius: "50%", background: cfg.color, border: `2.5px solid ${P.bg}`, boxShadow: `0 0 0 1.5px ${cfg.color}`, flexShrink: 0 }} />
              {!isLast && <div style={{ width: 2, flex: 1, background: P.border, marginTop: 3, minHeight: 24 }} />}
            </div>

            <div style={{ flex: 1, marginBottom: 10 }}>
              <div
                onClick={() => setExpanded(open ? null : i)}
                style={{
                  background: P.card, borderRadius: 10,
                  border: `1px solid ${open ? cfg.color + "88" : P.border}`,
                  padding: "12px 14px", cursor: "pointer",
                  boxShadow: open ? `0 2px 10px ${cfg.color}22` : "none",
                  transition: "border-color 0.15s",
                }}
              >
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}>
                      <span style={{ fontSize: 16 }}>{stop.flag}</span>
                      <span style={{ fontSize: 16, fontWeight: 700, color: P.text }}>{stop.loc}</span>
                    </div>
                    <div style={{ fontSize: 12, color: P.textMid, lineHeight: 1.4 }}>
                      {stop.dateRange}
                      {stop.dn && (
                        <span style={{
                          marginLeft: 8, fontSize: 11, fontWeight: 700,
                          color: cfg.color, background: cfg.bg,
                          padding: "1px 7px", borderRadius: 10,
                        }}>
                          {stop.dn}
                        </span>
                      )}
                    </div>
                    {stop.sub && (
                      <div style={{ fontSize: 11, color: P.textLight, marginTop: 3 }}>{stop.sub}</div>
                    )}
                  </div>
                  <span style={{ fontSize: 13, color: P.textLight, marginLeft: 8, marginTop: 2 }}>
                    {open ? "▴" : "▾"}
                  </span>
                </div>

                {open && (
                  <div style={{ marginTop: 12, borderTop: `1px solid ${P.border}`, paddingTop: 10 }}>
                    {stop.details.map((line, j) => (
                      <div key={j} style={{ display: "flex", gap: 8, marginBottom: 6, alignItems: "flex-start" }}>
                        <span style={{ color: line.startsWith("⚠️") ? P.red : cfg.color, fontSize: 12, flexShrink: 0, marginTop: 1 }}>
                          {line.startsWith("⚠️") ? "" : "·"}
                        </span>
                        <span style={{
                          fontSize: 13, color: line.startsWith("⚠️") ? P.red : P.textMid,
                          lineHeight: 1.5, fontWeight: line.startsWith("⚠️") ? 600 : 400,
                        }}>
                          {line}
                        </span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      })}

      <button onClick={onEditOpen} style={{
        position: "fixed", bottom: 24, right: 20, width: 52, height: 52,
        borderRadius: "50%", background: P.text, border: "none", color: "#fff",
        fontSize: 20, cursor: "pointer", fontFamily: "inherit",
        boxShadow: "0 4px 16px rgba(0,0,0,0.28)",
        display: "flex", alignItems: "center", justifyContent: "center", zIndex: 20,
      }} title="Edit itinerary">✏️</button>
    </div>
  );
}

// ── ADD ITEM MODAL ────────────────────────────────────────────────────────────
function AddItemModal({ destObj, subTab, onAdd, onClose }) {
  const [query, setQuery] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const inputRef = useRef(null);

  useEffect(() => { setTimeout(() => inputRef.current?.focus(), 50); }, []);

  const subLabel = subTab === "food" ? "food or drink" : subTab === "attractions" ? "attraction or activity" : "shop or market";
  const placeholder = subTab === "food" ? "e.g. Maison Marou, bánh xèo stall…" : subTab === "attractions" ? "e.g. Temple of Literature, boat tour…" : "e.g. silk shop, night market…";

  const SCHEMAS = {
    food: `Return ONLY valid JSON (no markdown) matching exactly:
{"name":"string","desc":"1–2 sentence description of the dish or drink","where":"specific restaurant name and address or area","price":"price range in local currency","spicy":true/false}`,
    attractions: `Return ONLY valid JSON (no markdown) matching exactly:
{"name":"string","desc":"1–2 sentence description of what it is and why it's worth visiting","tip":"entry price, best time to visit, or practical tip"}`,
    shopping: `Return ONLY valid JSON (no markdown) matching exactly:
{"name":"string","desc":"1–2 sentence description of the place and what makes it special","what":"comma-separated list of things to buy there"}`,
  };

  async function handleAdd() {
    if (!query.trim()) return;
    setLoading(true);
    setError("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 400,
          system: `You are a travel expert for ${destObj.name}, ${destObj.country}. The travelers are Mauricio (Argentine, loves culture/trekking) and Carla (Brazilian, foodie, artisan shopping). Moderate spice tolerance. Budget-conscious. ${SCHEMAS[subTab]}`,
          messages: [{ role: "user", content: `Give me details about this ${subLabel} in ${destObj.name}: "${query}"` }],
        }),
      });
      const data = await res.json();
      const raw = data.content?.map(c => c.text || "").join("") || "";
      const clean = raw.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      onAdd(subTab, { ...parsed, _userAdded: true });
      onClose();
    } catch (e) {
      setError("Couldn't autofill — check your internet connection, or try a more specific name.");
      setLoading(false);
    }
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", zIndex: 100, display: "flex", alignItems: "flex-end", justifyContent: "center" }}
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{ background: P.card, borderRadius: "16px 16px 0 0", padding: "24px 20px 32px", width: "100%", maxWidth: 480, boxShadow: "0 -4px 30px rgba(0,0,0,0.15)" }}>
        <div style={{ width: 36, height: 4, borderRadius: 2, background: P.border, margin: "0 auto 20px" }} />
        <div style={{ fontSize: 16, fontWeight: 700, color: P.text, marginBottom: 4 }}>
          Add to {subTab === "food" ? "🍜 Food & Drinks" : subTab === "attractions" ? "📍 Attractions" : "🛍️ Shopping"}
        </div>
        <div style={{ fontSize: 13, color: P.textLight, marginBottom: 16 }}>
          Type a name — AI will fill in the details for {destObj.flag} {destObj.name}
        </div>
        <input
          ref={inputRef}
          value={query}
          onChange={e => setQuery(e.target.value)}
          onKeyDown={e => e.key === "Enter" && handleAdd()}
          placeholder={placeholder}
          style={{
            width: "100%", padding: "13px 14px", borderRadius: 10,
            border: `1.5px solid ${P.border}`, fontSize: 15, fontFamily: "inherit",
            color: P.text, background: P.bg, outline: "none", boxSizing: "border-box",
            marginBottom: 12,
          }}
        />
        {error && (
          <div style={{ fontSize: 12, color: P.red, marginBottom: 12, lineHeight: 1.5 }}>{error}</div>
        )}
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={onClose} style={{ flex: 1, padding: "12px", borderRadius: 10, border: `1px solid ${P.border}`, background: P.bg, fontSize: 14, fontWeight: 600, color: P.textMid, cursor: "pointer", fontFamily: "inherit" }}>
            Cancel
          </button>
          <button
            onClick={handleAdd}
            disabled={loading || !query.trim()}
            style={{
              flex: 2, padding: "12px", borderRadius: 10, border: "none",
              background: loading || !query.trim() ? P.border : P.accent,
              fontSize: 14, fontWeight: 700, color: "#fff", cursor: loading || !query.trim() ? "default" : "pointer",
              fontFamily: "inherit", transition: "background 0.15s",
              display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
            }}
          >
            {loading ? (
              <>
                <span style={{ display: "inline-block", width: 14, height: 14, border: "2px solid rgba(255,255,255,0.4)", borderTopColor: "#fff", borderRadius: "50%", animation: "spin 0.7s linear infinite" }} />
                Autofilling…
              </>
            ) : "✦ Add with AI"}
          </button>
        </div>
      </div>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );
}

function AskChat({ destObj, isOnline }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const chatRef = useRef(null);
  const prevDestId = useRef(destObj?.id);

  useEffect(() => {
    if (destObj?.id !== prevDestId.current) { setMessages([]); prevDestId.current = destObj?.id; }
  }, [destObj]);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages]);

  const quickPrompts = ["Best hidden local restaurant?", "Cultural etiquette tips", "What's the history here?", "Safety tips", "Day trip ideas", "Nightlife suggestions"];

  async function sendMessage(text) {
    if (!text.trim() || loading) return;
    const userMsg = { role: "user", content: text };
    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    setInput("");
    setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: `You are a travel companion for Mauricio (Argentine, loves trekking and culture) and Carla (Brazilian, foodie, artisan shopping, beaches). They are in ${destObj?.name}, ${destObj?.country}. Budget ~$100/day combined. Give specific names and addresses where possible. Flag spicy dishes (moderate tolerance). No tourist traps, no resorts, no chains. Keep responses concise — they're reading on a phone.`,
          messages: newMessages.map(m => ({ role: m.role, content: m.content })),
        }),
      });
      const data = await res.json();
      const text2 = data.content?.map(c => c.text || "").join("") || "Sorry, no response.";
      setMessages(prev => [...prev, { role: "assistant", content: text2 }]);
    } catch {
      setMessages(prev => [...prev, { role: "assistant", content: "Connection error — this tab needs internet." }]);
    }
    setLoading(false);
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      {!isOnline && (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "32px 24px", textAlign: "center" }}>

            The AI chat needs internet. All other tabs — itinerary, bookings, food lists, phrasebook, and currency — work fully offline.
          </div>
        </div>
      )}
      {isOnline && (
        <>
          <div ref={chatRef} style={{ flex: 1, overflowY: "auto", padding: 16, background: "#f7f1e0" }}>
            {messages.length === 0 && (
              <div>
                <div style={{ textAlign: "center", padding: "16px 0 14px" }}>
                  <div style={{ fontSize: 28 }}>{destObj?.flag}</div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: P.text, marginTop: 4, fontFamily: "'Playfair Display', Georgia, serif" }}>Ask about {destObj?.name}</div>
                  <div style={{ fontSize: 12, color: P.textLight, marginTop: 4 }}>Requires internet connection</div>
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6, justifyContent: "center" }}>
                  {quickPrompts.map((p, i) => (
                    <button key={i} onClick={() => sendMessage(p)} style={{ padding: "7px 12px", borderRadius: 18, border: `1px solid ${P.border}`, background: P.card, fontSize: 11, color: P.textMid, cursor: "pointer", fontFamily: "inherit" }}>
                      {p}
                    </button>
                  ))}
                </div>
              </div>
            )}
            {messages.map((m, i) => (
              <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start", marginBottom: 10 }}>
                <div style={{

                <div style={{ padding: "10px 18px", borderRadius: 14, background: P.card, fontSize: 13, color: P.textLight, borderBottomLeftRadius: 4 }}>Thinking…</div>
              </div>

          <div style={{ padding: "10px 16px 16px", borderTop: `1px solid ${P.border}`, background: P.bg, display: "flex", gap: 8 }}>
            <input

    { code: "VND", symbol: "₫",  name: "Vietnamese Đồng",   flag: "🇻🇳" },
    { code: "KHR", symbol: "៛",  name: "Cambodian Riel",    flag: "🇰🇭" },
    { code: "KRW", symbol: "₩",  name: "South Korean Won",  flag: "🇰🇷" },
  ];

  function convert(from, to, val) {
    if (from === to) return val;
    const usd = from === "USD" ? val : val / rates[from];
    return to === "USD" ? usd : usd * rates[to];
  }

  const num = parseFloat(amount) || 0;
  const quickAmts = base === "USD" ? [1, 5, 10, 20, 50, 100]
    : base === "VND" ? [10000, 50000, 100000, 200000, 500000]
    : base === "KHR" ? [1000, 5000, 10000, 20000, 50000]
    : [1000, 5000, 10000, 50000, 100000];

  function format(code, val) {
    return (code === "VND" || code === "KHR" || code === "KRW")
      ? Math.round(val).toLocaleString()
      : val.toFixed(2);

// ── EDIT BOT ─────────────────────────────────────────────────────────────────
function EditBot({ itinerary, confirmed, toBook, onApply, onClose }) {
  const [messages, setMessages] = useState([{
    role: "assistant",
    content: "Hi! I can update your itinerary or bookings. Just tell me what changed — for example:\n\n- We moved Hue check-out to May 6\n- Add a hotel in Phnom Penh: Frangipani Royal Palace, conf 123456\n- Remove the SafetyWing reminder, already extended\n- Change the Seoul Airbnb checkout to 12:00",
    proposal: null,
  }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const chatRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages]);
  useEffect(() => { setTimeout(() => inputRef.current?.focus(), 100); }, []);

  async function send(text) {
    if (!text.trim() || loading) return;
    const userMsg = { role: "user", content: text, proposal: null };
    const history = [...messages, userMsg];
    setMessages(history);
    setInput("");
    setLoading(true);

    try {
      const systemPrompt = `You are a travel itinerary assistant helping Mauricio and Carla update their Southeast Asia trip plans.

Here is their CURRENT data (JSON):
${JSON.stringify({ itinerary, confirmed, toBook }, null, 2)}

When the user describes a change, respond with ONLY a JSON object (no markdown, no backticks):
{
  "reply": "Clear 1-2 sentence explanation of exactly what you're proposing to change",
  "proposal": {
    "type": "itinerary" | "confirmed" | "toBook",
    "action": "update" | "add" | "remove",
    "index": <number, 0-based, required for update/remove>,
    "data": <full new object for update/add, omit for remove>
  }
}

If the user is just asking a question or confirming/declining a proposal, set "proposal" to null.
For "update" actions, return the COMPLETE updated object.
For "add" actions to confirmed bookings, include all required fields: icon, title, date, warn, rows (array of [label, value] pairs).
For "add" actions to toBook, include: icon, title, dates, tip.
For "add" actions to itinerary, include: loc, sub, type (travel/explore/adventure/beach), flag, dateRange, dn, details (array of strings).`;

      const apiMessages = history
        .filter(m => m.role === "user" || m.role === "assistant")
        .map(m => ({ role: m.role, content: m.content }));

      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1200,
          system: systemPrompt,
          messages: apiMessages,
        }),
      });
      const data = await res.json();
      const raw = data.content?.map(c => c.text || "").join("") || "";
      const clean = raw.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      setMessages(prev => [...prev, { role: "assistant", content: parsed.reply, proposal: parsed.proposal || null }]);
    } catch (e) {
      setMessages(prev => [...prev, { role: "assistant", content: "Sorry, I couldn't process that. Check your internet connection and try again.", proposal: null }]);
    }
    setLoading(false);
  }

  function applyProposal(proposal) {
    onApply(proposal);
    setMessages(prev => [...prev, { role: "assistant", content: "✅ Done! The change has been applied. Anything else to update?", proposal: null }]);
  }

  function rejectProposal() {
    setMessages(prev => [...prev, { role: "assistant", content: "No problem, change cancelled. What else can I help with?", proposal: null }]);
  }

  function ProposalCard({ proposal }) {
    const typeLabels = { itinerary: "Itinerary", confirmed: "Confirmed Booking", toBook: "To Book" };
    const actionColors = { update: P.blue, add: P.green, remove: P.red };
    const actionLabels = { update: "Update", add: "Add", remove: "Remove" };
    const col = actionColors[proposal.action] || P.accent;

    let itemName = "";
    if (proposal.action === "remove" || proposal.action === "update") {
      const arr = proposal.type === "itinerary" ? itinerary : proposal.type === "confirmed" ? confirmed : toBook;
      const item = arr[proposal.index];
      itemName = item?.loc || item?.title || `Item #${proposal.index + 1}`;
    } else if (proposal.data) {
      itemName = proposal.data.loc || proposal.data.title || "New item";
    }

    return (
      <div style={{ margin: "8px 0 4px", padding: "12px 14px", borderRadius: 12, background: P.card, border: `1.5px solid ${col}33` }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
          <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 10, background: col + "18", color: col, textTransform: "uppercase", letterSpacing: 0.5 }}>
            {actionLabels[proposal.action]}
          </span>
          <span style={{ fontSize: 11, color: P.textLight }}>{typeLabels[proposal.type]}</span>
        </div>
        <div style={{ fontSize: 13, fontWeight: 600, color: P.text, marginBottom: 12 }}>{itemName}</div>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={rejectProposal} style={{ flex: 1, padding: "9px", borderRadius: 8, border: `1px solid ${P.border}`, background: P.bg, fontSize: 13, fontWeight: 600, color: P.textMid, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
          <button onClick={() => applyProposal(proposal)} style={{ flex: 2, padding: "9px", borderRadius: 8, border: "none", background: col, fontSize: 13, fontWeight: 700, color: "#fff", cursor: "pointer", fontFamily: "inherit" }}>Confirm change</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 200, display: "flex", flexDirection: "column", justifyContent: "flex-end" }}
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{ background: P.bg, borderRadius: "18px 18px 0 0", maxHeight: "85dvh", display: "flex", flexDirection: "column", maxWidth: 480, width: "100%", margin: "0 auto", boxShadow: "0 -4px 30px rgba(0,0,0,0.2)" }}>
        <div style={{ padding: "14px 18px 12px", borderBottom: `1px solid ${P.border}`, display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, color: P.text }}>✏️ Edit Assistant</div>
            <div style={{ fontSize: 11, color: P.textLight, marginTop: 2 }}>Describe any change — I'll propose it first</div>
          </div>
          <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 20, color: P.textLight, cursor: "pointer", padding: 4, lineHeight: 1 }}>×</button>
        </div>

        <div ref={chatRef} style={{ flex: 1, overflowY: "auto", padding: "14px 16px", display: "flex", flexDirection: "column", gap: 2 }}>
          {messages.map((m, i) => (
            <div key={i}>
              <div style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start", marginBottom: 6 }}>
                <div style={{
                  maxWidth: "88%", padding: "10px 14px", borderRadius: 14,
                  background: m.role === "user" ? P.text : P.card,
                  color: m.role === "user" ? "#fff" : P.text,
                  fontSize: 13, lineHeight: 1.6, whiteSpace: "pre-wrap",
                  borderBottomRightRadius: m.role === "user" ? 4 : 14,
                  borderBottomLeftRadius: m.role === "user" ? 14 : 4,
                  border: m.role === "assistant" ? `1px solid ${P.border}` : "none",
                }}>
                  {m.content}
                </div>
              </div>
              {m.proposal && <ProposalCard proposal={m.proposal} />}
            </div>
          ))}
          {loading && (
            <div style={{ display: "flex", marginBottom: 6 }}>
              <div style={{ padding: "10px 16px", borderRadius: 14, background: P.card, border: `1px solid ${P.border}`, fontSize: 13, color: P.textLight, borderBottomLeftRadius: 4 }}>Thinking…</div>
            </div>
          )}
        </div>

        <div style={{ padding: "10px 14px 20px", borderTop: `1px solid ${P.border}`, display: "flex", gap: 8, flexShrink: 0, background: P.bg }}>
          <input
            ref={inputRef}
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => e.key === "Enter" && !e.shiftKey && send(input)}
            placeholder="Describe a change…"
            style={{ flex: 1, padding: "10px 14px", borderRadius: 22, border: `1px solid ${P.border}`, background: P.card, fontSize: 14, fontFamily: "inherit", color: P.text, outline: "none" }}
          />
          <button onClick={() => send(input)} disabled={loading || !input.trim()} style={{
            padding: "10px 16px", borderRadius: 22, border: "none",
            background: loading || !input.trim() ? P.border : P.text,
            color: "#fff", fontSize: 14, fontWeight: 600, cursor: loading || !input.trim() ? "default" : "pointer",
            fontFamily: "inherit",
          }}>→</button>
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
const MAIN_TABS = [
  { id: "itinerary", label: "Itinerary", icon: "📅" },
  { id: "bookings",  label: "Bookings",  icon: "📋" },
  { id: "explore",   label: "Explore",   icon: "🧭" },
  { id: "currency",  label: "Currency",  icon: "💱" },
  { id: "phrases",   label: "Phrases",   icon: "💬" },
];

function App() {
  const [tab, setTab] = useState("itinerary");
  const [editOpen, setEditOpen] = useState(false);
  const [isOnline, setIsOnline] = useState(() => navigator.onLine);

  useEffect(() => {
    const goOnline  = () => setIsOnline(true);
    const goOffline = () => setIsOnline(false);
    window.addEventListener("online",  goOnline);
    window.addEventListener("offline", goOffline);
    return () => {
      window.removeEventListener("online",  goOnline);
      window.removeEventListener("offline", goOffline);
    };
  }, []);

  const [liveItinerary, setLiveItinerary] = useState(() => JSON.parse(JSON.stringify(ITINERARY_GROUPS)));
  const [liveConfirmed, setLiveConfirmed] = useState(() => JSON.parse(JSON.stringify(CONFIRMED)));
  const [liveToBook, setLiveToBook] = useState(() => JSON.parse(JSON.stringify(TO_BOOK)));

  function applyChange(proposal) {
    const { type, action, index, data } = proposal;
    if (type === "itinerary") {
      setLiveItinerary(prev => { const n = [...prev]; if (action === "update") n[index] = data; else if (action === "add") n.push(data); else if (action === "remove") n.splice(index, 1); return n; });
    } else if (type === "confirmed") {
      setLiveConfirmed(prev => { const n = [...prev]; if (action === "update") n[index] = data; else if (action === "add") n.push(data); else if (action === "remove") n.splice(index, 1); return n; });
    } else if (type === "toBook") {
      setLiveToBook(prev => { const n = [...prev]; if (action === "update") n[index] = data; else if (action === "add") n.push(data); else if (action === "remove") n.splice(index, 1); return n; });
    }
  }

  return (
    <div style={{ fontFamily: "'Source Sans 3', 'Source Sans Pro', -apple-system, sans-serif", background: P.bg, minHeight: "100dvh", color: P.text, maxWidth: 480, margin: "0 auto" }}>
      <div style={{ background: `linear-gradient(135deg, ${P.accent} 0%, #a04008 100%)`, padding: "20px 16px 14px", color: "#fff" }}>
        <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: 1.5, textTransform: "uppercase", opacity: 0.8 }}>Mauricio & Carla</div>
        <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "'Playfair Display', Georgia, serif", marginTop: 2 }}>Southeast Asia 2026</div>
        <div style={{ fontSize: 12, opacity: 0.75, marginTop: 4 }}>🇻🇳 Vietnam · 🇰🇭 Cambodia · 🇰🇷 South Korea — 33 days</div>
      </div>

      {!isOnline && (
        <div style={{ background: "#2c2417", color: "#fff", padding: "8px 16px", display: "flex", alignItems: "center", gap: 8, fontSize: 12 }}>
          <span style={{ fontSize: 14 }}>🏔️</span>
          <span style={{ fontWeight: 600 }}>Offline mode</span>
          <span style={{ color: "rgba(255,255,255,0.65)" }}>— Itinerary, bookings, phrases & currency work fully offline.</span>
        </div>
      )}

      <TopTabs active={tab} onChange={setTab} tabs={MAIN_TABS} />

      {tab === "itinerary" && <ItineraryTab groups={liveItinerary} onEditOpen={() => setEditOpen(true)} />}
      {tab === "bookings"  && <BookingsTab confirmed={liveConfirmed} toBook={liveToBook} onEditOpen={() => setEditOpen(true)} />}
      {tab === "explore"   && <ExploreTab isOnline={isOnline} />}
      {tab === "currency"  && <CurrencyTab />}
      {tab === "phrases"   && <PhrasebookTab />}

      {editOpen && isOnline && (
        <EditBot itinerary={liveItinerary} confirmed={liveConfirmed} toBook={liveToBook} onApply={applyChange} onClose={() => setEditOpen(false)} />
      )}
      {editOpen && !isOnline && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 200, display: "flex", alignItems: "flex-end", justifyContent: "center" }}
          onClick={() => setEditOpen(false)}>
          <div style={{ background: P.bg, borderRadius: "18px 18px 0 0", padding: "32px 24px 40px", maxWidth: 480, width: "100%", textAlign: "center" }}>
            <div style={{ fontSize: 40, marginBottom: 14 }}>🏔️</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: P.text, fontFamily: "'Playfair Display', Georgia, serif", marginBottom: 8 }}>You're offline</div>
            <div style={{ fontSize: 13, color: P.textMid, lineHeight: 1.6 }}>The Edit Assistant needs internet to work.<br/>All your itinerary and booking details are still accessible in the tabs above.</div>
            <button onClick={() => setEditOpen(false)} style={{ marginTop: 20, padding: "10px 28px", borderRadius: 22, border: "none", background: P.text, color: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Got it</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── MOUNT ────────────────────────────────────────────────────────────────────
const _root = ReactDOM.createRoot(document.getElementById('root'));
_root.render(<App />);

// Hide splash once React has painted
requestAnimationFrame(() => {
  requestAnimationFrame(() => {
    const splash = document.getElementById('splash');
    if (splash) { splash.classList.add('hidden'); setTimeout(() => splash.remove(), 500); }
  });
});
</script>

<!-- ═══════════════════════════════════════════════════
     PWA SETUP  (manifest + touch icon + service worker)
══════════════════════════════════════════════════════ -->
<script>
(function() {
  // ── 1. Generate apple-touch-icon as a canvas PNG ──────────────────────────
  try {
    const cv = document.createElement('canvas');
    cv.width = cv.height = 180;
    const ctx = cv.getContext('2d');
    // Background gradient
    const g = ctx.createLinearGradient(0, 0, 180, 180);
    g.addColorStop(0, '#bf5a1a');
    g.addColorStop(1, '#a04008');
    ctx.fillStyle = g;
    // Rounded rect (r=38)
    const r = 38;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(180-r, 0);
    ctx.quadraticCurveTo(180, 0, 180, r);
    ctx.lineTo(180, 180-r);
    ctx.quadraticCurveTo(180, 180, 180-r, 180);
    ctx.lineTo(r, 180);
    ctx.quadraticCurveTo(0, 180, 0, 180-r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fill();
    // Emoji
    ctx.font = '90px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('✈', 90, 96);
    document.getElementById('ati').href = cv.toDataURL('image/png');
  } catch(e) {}

  // ── 2. Inline PWA manifest ────────────────────────────────────────────────
  try {
    const manifest = {
      name: "SE Asia 2026 — Mauricio & Carla",
      short_name: "SE Asia 2026",
      description: "Vietnam · Cambodia · South Korea travel companion",
      start_url: ".",
      display: "standalone",
      background_color: "#fdf6e3",
      theme_color: "#bf5a1a",
      orientation: "portrait-primary",
      icons: [{ src: document.getElementById('ati').href, sizes: "180x180", type: "image/png" }]
    };
    const mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    const mLink = document.createElement('link');
    mLink.rel = 'manifest';
    mLink.href = URL.createObjectURL(mBlob);
    document.head.appendChild(mLink);
  } catch(e) {}

  // ── 3. Service Worker for offline caching ─────────────────────────────────
  // NOTE: Blob-based SW has limited scope, but still caches CDN deps (React,
  // Babel, fonts). The HTML file itself must be saved by the browser normally.
  if ('serviceWorker' in navigator) {
    const SW = `
const CACHE = 'sea2026-v2';
const PRECACHE = [
  'https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js',
  'https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap'
];

self.addEventListener('install', e => {
  self.skipWaiting();
  e.waitUntil(
    caches.open(CACHE).then(c => {
      return Promise.allSettled(PRECACHE.map(url =>
        c.add(url).catch(() => {})
      ));
    })
  );
});

self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => clients.claim())
  );
});

self.addEventListener('fetch', e => {
  // Never intercept Anthropic API calls
  if (e.request.url.includes('api.anthropic.com')) return;

  e.respondWith(
    caches.open(CACHE).then(cache =>
      cache.match(e.request).then(cached => {
        const network = fetch(e.request)
          .then(res => {
            if (res.ok && res.type !== 'opaque') {
              cache.put(e.request, res.clone());
            }
            return res;
          })
          .catch(() => cached || new Response('Offline', { status: 503 }));
        return cached || network;
      })
    )
  );
});
`;
    try {
      const swBlob = new Blob([SW], { type: 'application/javascript' });
      const swUrl = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl).catch(() => {});
    } catch(e) {}
  }
})();
</script>
